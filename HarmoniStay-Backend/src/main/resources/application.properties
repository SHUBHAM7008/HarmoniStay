spring.application.name=HarmoniStay-Backend
spring.profiles.active=local
# For cloud MongoDB: spring.data.mongodb.uri=${MONGODB_URI}

spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=HarmoniStayDB

server.port=8888

razorpay.key_id=${RAZORPAY_KEY_ID:}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:}

twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}





