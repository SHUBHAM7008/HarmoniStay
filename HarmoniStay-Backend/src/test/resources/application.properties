# Test profile — in-memory H2 (does not use PostgreSQL or application-local)
spring.profiles.active=test
spring.application.name=HarmoniStay-Backend-test

spring.datasource.url=jdbc:h2:mem:harmonistay;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

razorpay.key_id=test
razorpay.key_secret=test
twilio.account.sid=test
twilio.auth.token=test
twilio.phone.number=+10000000000
